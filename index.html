<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记忆翻牌游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #FFF3CD 0%, #C8E6C9 50%, #A5D6A7 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Comic Sans MS', 'Chalkboard SE', 'Marker Felt', sans-serif;
            padding: 20px;
        }

        h1 {
            color: #2E7D32;
            margin-bottom: 20px;
            font-weight: bold;
            letter-spacing: 3px;
            font-size: 42px;
            text-shadow: 3px 3px 0 rgba(255, 255, 255, 0.8),
                         -1px -1px 0 rgba(255, 255, 255, 0.8),
                         1px -1px 0 rgba(255, 255, 255, 0.8),
                         -1px 1px 0 rgba(255, 255, 255, 0.8);
        }

        .stats {
            display: flex;
            gap: 30px;
            margin-bottom: 20px;
            font-size: 20px;
            color: #555;
        }

        .stats span {
            background: rgba(255, 255, 255, 0.85);
            padding: 12px 25px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15),
                        0 2px 8px rgba(0, 0, 0, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 3px solid rgba(255, 255, 255, 0.6);
        }

        .stats strong {
            color: #2E7D32;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            gap: 12px;
            max-width: 440px;
            width: 100%;
        }

        .game-board.size-4 {
            grid-template-columns: repeat(4, 1fr);
        }

        .game-board.size-6 {
            grid-template-columns: repeat(6, 1fr);
            max-width: 600px;
        }

        .game-board.size-8 {
            grid-template-columns: repeat(8, 1fr);
            max-width: 700px;
        }

        .difficulty-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .difficulty-title {
            font-size: 28px;
            color: #2E7D32;
            margin-bottom: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8),
                         -1px -1px 0 rgba(255, 255, 255, 0.8),
                         1px -1px 0 rgba(255, 255, 255, 0.8),
                         -1px 1px 0 rgba(255, 255, 255, 0.8);
        }

        .difficulty-buttons {
            display: flex;
            gap: 15px;
        }

        .difficulty-btn {
            padding: 18px 35px;
            font-size: 18px;
            background: white;
            color: #1e3a5f;
            border: 3px solid #1e3a5f;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15),
                        0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .difficulty-btn:hover {
            background: #1e3a5f;
            color: white;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(30, 58, 95, 0.4);
        }

        .difficulty-btn.easy {
            border-color: #4CAF50;
            color: #4CAF50;
        }

        .difficulty-btn.easy:hover {
            background: #4CAF50;
            color: white;
        }

        .difficulty-btn.medium {
            border-color: #FF9800;
            color: #FF9800;
        }

        .difficulty-btn.medium:hover {
            background: #FF9800;
            color: white;
        }

        .difficulty-btn.hard {
            border-color: #F44336;
            color: #F44336;
        }

        .difficulty-btn.hard:hover {
            background: #F44336;
            color: white;
        }

        .game-container {
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .game-container.show {
            display: flex;
        }

        .difficulty-select.hide {
            display: none;
        }

        .card {
            aspect-ratio: 1;
            perspective: 1000px;
            cursor: pointer;
        }

        .card-inner {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
        }

        .card.flipped .card-inner {
            transform: rotateY(180deg);
        }

        .card.matched .card-inner {
            transform: rotateY(180deg);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15),
                        0 3px 10px rgba(0, 0, 0, 0.1),
                        inset 0 1px 0 rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.4);
        }

        .card-back {
            background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 50%, #81C784 100%);
        }

        .card-back::before {
            content: '?';
            font-size: 36px;
            color: rgba(255, 255, 255, 0.9);
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .card-front {
            background: #ffffff;
            transform: rotateY(180deg);
            font-size: 42px;
        }

        .card.matched .card-front {
            background: linear-gradient(135deg, #C8E6C9 0%, #A5D6A7 100%);
        }

        .card:hover:not(.flipped):not(.matched) .card-inner {
            transform: scale(1.08);
        }

        .card.matched {
            cursor: default;
        }

        .restart-btn {
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 18px;
            background: linear-gradient(135deg, #4CAF50 0%, #66BB6A 100%);
            color: white;
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.3),
                        0 2px 8px rgba(76, 175, 80, 0.2);
        }

        .restart-btn:hover {
            background: linear-gradient(135deg, #66BB6A 0%, #81C784 100%);
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 6px 20px rgba(76, 175, 80, 0.4),
                        0 3px 12px rgba(76, 175, 80, 0.3);
        }

        .win-message {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        .win-message.show {
            display: flex;
        }

        .win-content {
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            padding: 50px 70px;
            border-radius: 30px;
            text-align: center;
            animation: popIn 0.5s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2),
                        0 5px 20px rgba(0, 0, 0, 0.15),
                        inset 0 1px 0 rgba(255, 255, 255, 0.8);
            border: 4px solid rgba(255, 255, 255, 0.6);
        }

        @keyframes popIn {
            0% {
                transform: scale(0.3);
                opacity: 0;
            }
            50% {
                transform: scale(1.1);
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .win-content h2 {
            color: #4CAF50;
            margin-bottom: 20px;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 0 rgba(255, 255, 255, 0.8),
                         -1px -1px 0 rgba(255, 255, 255, 0.8),
                         1px -1px 0 rgba(255, 255, 255, 0.8),
                         -1px 1px 0 rgba(255, 255, 255, 0.8);
        }

        .win-content p {
            color: #555;
            margin-bottom: 30px;
            font-size: 20px;
        }

        .win-content strong {
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="difficulty-select" id="difficultySelect">
        <h1>记忆翻牌游戏</h1>
        <div class="difficulty-title">选择难度</div>
        <div class="difficulty-buttons">
            <button class="difficulty-btn easy" onclick="startGame(4)">简单 4×4</button>
            <button class="difficulty-btn medium" onclick="startGame(6)">中等 6×6</button>
            <button class="difficulty-btn hard" onclick="startGame(8)">困难 8×8</button>
        </div>
    </div>

    <div class="game-container" id="gameContainer">
        <h1>记忆翻牌游戏</h1>
        <div class="stats">
            <span>步数: <strong id="moves">0</strong></span>
            <span>配对: <strong id="pairs">0</strong>/<strong id="totalPairs">8</strong></span>
            <span>时间: <strong id="timer">00:00</strong></span>
        </div>
        <div class="game-board" id="gameBoard"></div>
        <button class="restart-btn" onclick="backToMenu()">返回菜单</button>
        <button class="restart-btn" onclick="restartGame()">重新开始</button>
    </div>

    <div class="win-message" id="winMessage">
        <div class="win-content">
            <h2>🎉 恭喜你赢了！</h2>
            <p>总共用了 <strong id="finalMoves">0</strong> 步，用时 <strong id="finalTime">00:00</strong></p>
            <button class="restart-btn" onclick="backToMenu()">返回菜单</button>
            <button class="restart-btn" onclick="restartGame()">再玩一次</button>
        </div>
    </div>

    <script>
        const allEmojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍑', '🥝', '🍒', '🍌', '🍉', '🍍', '🥭', '🍐', '🍈', '🍑', '🫐', '🥥', '🥑', '🍆', '🥕', '🌽', '🥦', '🍄', '🥔', '🌶️', '🥒', '🥬', '🥑', '🍅', '🧄', '🧅', '🌮'];
        let cards = [];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;
        let timerInterval;
        let seconds = 0;
        let timerStarted = false;
        let currentDifficulty = 4;
        let totalPairs = 8;
        let audioContext;

        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playTone(frequency, duration, type = 'sine', startTime = 0) {
            initAudio();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.type = type;
            oscillator.frequency.setValueAtTime(frequency, audioContext.currentTime + startTime);
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime + startTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + startTime + duration);
            
            oscillator.start(audioContext.currentTime + startTime);
            oscillator.stop(audioContext.currentTime + startTime + duration);
        }

        function playFlipSound() {
            playTone(880, 0.1, 'sine');
        }

        function playMatchSound() {
            playTone(523.25, 0.15, 'sine', 0);
            playTone(659.25, 0.2, 'sine', 0.1);
        }

        function playWinSound() {
            const notes = [
                { freq: 523.25, duration: 0.2, delay: 0 },
                { freq: 659.25, duration: 0.2, delay: 0.2 },
                { freq: 783.99, duration: 0.2, delay: 0.4 },
                { freq: 1046.50, duration: 0.4, delay: 0.6 },
                { freq: 783.99, duration: 0.2, delay: 1.0 },
                { freq: 1046.50, duration: 0.6, delay: 1.2 }
            ];
            
            notes.forEach(note => {
                playTone(note.freq, note.duration, 'sine', note.delay);
            });
        }

        function getEmojisForDifficulty(size) {
            const pairsNeeded = (size * size) / 2;
            return allEmojis.slice(0, pairsNeeded);
        }

        function startGame(size) {
            currentDifficulty = size;
            totalPairs = (size * size) / 2;
            document.getElementById('totalPairs').textContent = totalPairs;
            document.getElementById('difficultySelect').classList.add('hide');
            document.getElementById('gameContainer').classList.add('show');
            initGame();
        }

        function backToMenu() {
            document.getElementById('winMessage').classList.remove('show');
            document.getElementById('gameContainer').classList.remove('show');
            document.getElementById('difficultySelect').classList.remove('hide');
            resetTimer();
        }

        function restartGame() {
            document.getElementById('winMessage').classList.remove('show');
            initGame();
        }

        function formatTime(totalSeconds) {
            const minutes = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            return `${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerStarted) return;
            timerStarted = true;
            timerInterval = setInterval(() => {
                seconds++;
                document.getElementById('timer').textContent = formatTime(seconds);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function resetTimer() {
            stopTimer();
            seconds = 0;
            timerStarted = false;
            document.getElementById('timer').textContent = '00:00';
        }

        function shuffle(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        function createCard(emoji, index) {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.emoji = emoji;
            card.dataset.index = index;
            card.innerHTML = `
                <div class="card-inner">
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">${emoji}</div>
                </div>
            `;
            card.addEventListener('click', () => flipCard(card));
            return card;
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) {
                return;
            }

            initAudio();
            startTimer();
            playFlipSound();
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            canFlip = false;
            const [card1, card2] = flippedCards;
            const isMatch = card1.dataset.emoji === card2.dataset.emoji;

            if (isMatch) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                document.getElementById('pairs').textContent = matchedPairs;
                flippedCards = [];
                canFlip = true;
                playMatchSound();

                if (matchedPairs === totalPairs) {
                    setTimeout(showWin, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function showWin() {
            stopTimer();
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = formatTime(seconds);
            document.getElementById('winMessage').classList.add('show');
            playWinSound();
        }

        function initGame() {
            const gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            document.getElementById('winMessage').classList.remove('show');

            cards = [];
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;
            resetTimer();

            document.getElementById('moves').textContent = '0';
            document.getElementById('pairs').textContent = '0';

            const emojis = getEmojisForDifficulty(currentDifficulty);
            const cardPairs = shuffle([...emojis, ...emojis]);
            
            gameBoard.className = 'game-board size-' + currentDifficulty;
            
            cardPairs.forEach((emoji, index) => {
                const card = createCard(emoji, index);
                cards.push(card);
                gameBoard.appendChild(card);
            });
        }
    </script>
</body>
</html>
